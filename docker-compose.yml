services:
  minecraft:
    image: itzg/minecraft-server
    environment:
      EULA: "TRUE"
      TYPE: FABRIC
      VERSION: "1.20.1"
      MEMORY: "4G"
      RCON_PASSWORD: "shadowledger"
      ENABLE_RCON: "true"
    ports:
      - "25565:25565"
      - "25575:25575"
    volumes:
      - ./minecraft-data:/data
    stdin_open: true
    tty: true

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: shadow_ledger
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./pg-data:/var/lib/postgresql/data
